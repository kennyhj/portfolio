career-profile:
    title: About Me
    summary: |
      Hi there, my name is Kenny, and in 2023 I decided to pivot my career goals toward becoming a data analyst!
      I started by enrolling in classes learning the foundational technical skills working with data in SQL, Python, and Tableau.
      I also took part in a data analytics apprenticeship program throughout the latter half of 2023, where as
      I've been learning the foundational skills in Excel, SQL, Python, and Tableau through classes as well as personal projects.
      I've also taken part in a data analytics apprenticeship program called COOP.
      - Portfolio currently under construction!

